version: "{build}"

image: Visual Studio 2019

clone_folder: c:\stackless

# Build matrix: architectures + build types
environment:
  matrix:
    - TARGET_ARCH: x64
      BUILD_MODE: Release
#    - TARGET_ARCH: x64
#      BUILD_MODE: Debug
#    - TARGET_ARCH: Win32
#      BUILD_MODE: Release
#    - TARGET_ARCH: Win32
#      BUILD_MODE: Debug

install:
  - cmd: if "%TARGET_ARCH%"=="x64"  call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvarsall.bat" x64
  - cmd: if "%TARGET_ARCH%"=="Win32" call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvarsall.bat" x86

build_script:
  - git clone https://github.com/stackless-dev/stackless.git
  - cmd: dir "C:\stackless\stackless"
  - cmd: cd c:\stackless\stackless\PCbuild

  # Use CPython's build.bat to build Stackless
  # -e = optimized build; -d = debug build
  - cmd: if "%BUILD_MODE%"=="Release" build.bat -e -p %TARGET_ARCH%
  - cmd: if "%BUILD_MODE%"=="Debug"   build.bat -d -p %TARGET_ARCH%

test_script:
  # Only run tests for the canonical build (x64 Release)
  - cmd: where python.exe
  - cmd: if "%TARGET_ARCH%"=="x64" if "%BUILD_MODE%"=="Release" c:\stackless\stackless\PCbuild\amd64\python.exe -m test -q

artifacts:
  - path: PCbuild\*\*.exe
    name: stackless-executables

  - path: PCbuild\*\*.pyd
    name: stackless-extension-modules

  - path: PCbuild\*\*.dll
    name: stackless-dlls

  - path: PCbuild\*\*.zip
    name: stackless-packages

cache:
  - C:\Users\appveyor\AppData\Local\pip\Cache


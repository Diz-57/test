version: "{build}"

image: Visual Studio 2017

clone_folder: c:\stackless

before_build:
  - git clone https://github.com/stackless-dev/stackman.git
  - cmd: where stackman.h
  - ps: |+
      if ($env:APPVEYOR_RE_BUILD) {
        echo 'Doing full build due to re-build request.'
      } elseif (!$env:APPVEYOR_PULL_REQUEST_HEAD_COMMIT) {
        echo 'Not a PR, doing full build.'
      } else {
        git fetch -q origin +refs/heads/$env:APPVEYOR_REPO_BRANCH
        $mergebase = git merge-base HEAD FETCH_HEAD
        $changes = git diff --name-only HEAD $mergebase | grep -vE '(\.rst$)|(^Doc)|(^Misc)'
        If (!$changes) {
          echo 'Only docs were updated, stopping build process.'
          Exit-AppveyorBuild
        } else {
          echo 'Doing full build due to non-doc changes in these files:'
          echo $changes
        }
      }

build_script:
  - git clone https://github.com/stackless-dev/stackless.git
#  - git clone https://github.com/stackless-dev/stackman.git
#  - cmd: dir
#  - cmd: robocopy "c:\stackless\stackman" "c:\stackless\stackless\stackless\stackman" /E
#  - cmd: move "c:\stackless\stackman\stackman" "c:\stackless\stackless\stackman"
#  - cmd: dir stackman
#  - cmd: where stackman.h
#  - cmd: dir stackless\stackman
#  - cmd: dir stackman\stackman
#  - cmd: dir c:\stackless\stackless\stackman

  - cmd: stackless\PCbuild\build.bat -e -p x64
  - cmd: stackless\PCbuild\amd64\python.exe -m test.pythoninfo
test_script:
  - cmd: stackless\stackless\PCbuild\rt.bat -x64 -q -uall -u-cpu -u-largefile -rwW --slowest --timeout=1200 --fail-env-changed -j0
environment:
  HOST_PYTHON: C:\Python36\python.exe
